<div class="container">
    <div class="mt-5">
        <h3 class="my-3">Add meal</h3>
        <form [formGroup]="form">
            <div class="row">
                <div class="mb-3 col-lg-9">
                    <label for="name" class="form-label">Meal name</label>
                    <input type="text" class="form-control" id="name" formControlName="name">
                </div>
                <div class="mb-3 col-lg-3">
                    <label for="calories" class="form-label">Calories(kcal)</label>
                    <input type="text" class="form-control" id="calories" formControlName="calories">
                </div>
            </div>
            <div class="d-flex flex-column gap-3 mt-3 flex-lg-row justify-content-end">
                <button type="button" class="btn btn-danger">Cancel</button>
                <button type="submit" class="btn btn-success">Submit</button>
            </div>
        </form>
    </div>
</div>
